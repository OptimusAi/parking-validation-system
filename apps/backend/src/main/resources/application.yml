server:
  port: 8080

spring:
  application:
    name: parking-validation
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:tms_parking}
    username: ${DB_USERNAME:tms_user}
    password: ${DB_PASSWORD:tms_password}
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

oauth:
  host: ${OAUTH_HOST:http://localhost:9090}
  client-id: ${OAUTH_CLIENT_ID:cpa-tms-client}
  client-secret: ${OAUTH_CLIENT_SECRET:Cp@P@rkPlusClientS3cr3tPassw0rd}
  # JWKS endpoint for RS256 Bearer token verification.
  # Defaults to {oauth.host}/.well-known/jwks.json if left blank.
  # Override via OAUTH_JWKS_URI env var (e.g. https://your-auth-server/.well-known/jwks.json).
  jwks-uri: ${OAUTH_JWKS_URI:}
  jwt:
    public-key-path: ${OAUTH_JWT_PUBLIC_KEY_PATH:classpath:tms-jwt-pub.jks}
  refresh-token-ttl-hours: 8
  user-role-cache-minutes: 5
  # When true, a missing/unreachable JWKS endpoint degrades to unverified JWT parsing,
  # and direct email+password login against the local DB is enabled.
  # Set to false in production (default via OAUTH_LOCAL_AUTH_ENABLED env var).
  local-auth-enabled: ${OAUTH_LOCAL_AUTH_ENABLED:true}

# TMS-internal JWT (signed at login, validated on every request by JwtAuthenticationFilter).
# Must be at least 32 chars. Override via TMS_JWT_SECRET env var in prod.
tms:
  jwt:
    secret: ${TMS_JWT_SECRET:tms-internal-secret-change-me-in-production-min32}
    expiry-hours: ${TMS_JWT_EXPIRY_HOURS:8}
  qr:
    hmac-secret: ${TMS_QR_HMAC_SECRET:qr-hmac-secret-change-me-in-production-min32chars}

aws:
  region: ${AWS_REGION:ca-central-1}
  s3:
    bucket: ${AWS_S3_BUCKET:tms-reports}
  ses:
    from-email: ${AWS_SES_FROM_EMAIL:noreply@optimus-ai.com}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}

qr:
  hmac-secret: ${QR_HMAC_SECRET:change-me-minimum-32-characters-here}
  base-url: ${APP_BASE_URL:http://localhost:3000}

logging:
  level:
    ca.optimusAI.tms: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
